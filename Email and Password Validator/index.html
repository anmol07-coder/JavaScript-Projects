<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Email & Password Validator</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="container">

        <h1>Email & Password Validator</h1>

        <p class="subtitle">
            Validate user credentials in real time.
        </p>

        <form id="validator-form">

            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email">

                <small id="email-message"></small>

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password">

                    <button
                        type="button"
                        id="toggle-password">
                        👁
                    </button>

                </div>

                <small id="password-message"></small>

            </div>

            <div class="strength">

                <div class="strength-fill"
                     id="strength-fill"></div>

            </div>

            <button
                type="submit"
                id="submit-btn">

                Validate

            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
