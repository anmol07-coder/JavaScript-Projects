<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Preference System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>Theme Preference System</h1>

            <p>
                This website automatically follows your system theme.
                You can also manually switch themes and your choice
                will be remembered after page reload.
            </p>

            <button id="theme-btn">
                Toggle Theme
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
