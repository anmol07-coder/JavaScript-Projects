<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Auto Hide Alert Banner</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <button id="show-alert">
        Show Notification
    </button>

    <div class="notification" id="notification">

        <div class="icon">
            ✓
        </div>

        <div class="content">

            <h3>Success</h3>

            <p>
                Your profile has been updated successfully.
            </p>

        </div>

        <span class="close">&times;</span>

    </div>

    <script src="script.js"></script>

</body>

</html>
