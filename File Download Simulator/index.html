<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>File Download Simulator</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="container">

        <div class="file-icon">
            📁
        </div>

        <h1>File Download Simulator</h1>

        <p class="subtitle">
            Simulate a modern file download with progress updates.
        </p>

        <div class="file-details">

            <h3 id="file-name">
                JavaScript_Project.zip
            </h3>

            <span id="file-size">
                Size : 25 MB
            </span>

        </div>

        <div class="progress-track">

            <div class="progress-fill"
                 id="progress-fill"></div>

        </div>

        <div class="download-info">

            <span id="percentage">
                0%
            </span>

            <span id="status">
                Waiting...
            </span>

        </div>

        <button id="download-btn">

            Download

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
