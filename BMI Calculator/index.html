<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BMI Calculator</title>

    <link rel="stylesheet"
          href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="wrapper">

        <div class="left-panel">

            <h1>BMI Calculator</h1>

            <p>
                Calculate your Body Mass Index instantly and check your health category.
            </p>

            <form id="bmi-form">

                <div class="input-box">

                    <label for="height">
                        Height (cm)
                    </label>

                    <input
                        type="number"
                        id="height"
                        placeholder="e.g. 175">

                </div>

                <div class="input-box">

                    <label for="weight">
                        Weight (kg)
                    </label>

                    <input
                        type="number"
                        id="weight"
                        placeholder="e.g. 68">

                </div>

                <button id="calculate-btn">
                    Calculate BMI
                </button>

            </form>

        </div>

        <div class="right-panel">

            <div class="result-circle">

                <span id="bmi-value">
                    0.0
                </span>

            </div>

            <h2 id="bmi-status">
                Healthy
            </h2>

            <p id="message">
                Enter your height and weight to calculate your BMI.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
