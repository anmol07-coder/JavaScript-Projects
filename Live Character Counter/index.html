<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Live Character Counter</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="container">

        <h1>✍️ Live Character Counter</h1>

        <p class="subtitle">
            Start typing and watch the counter update instantly.
        </p>

        <textarea
            id="message"
            placeholder="Write something amazing..."
            maxlength="250"></textarea>

        <!-- Progress Bar -->

        <div class="progress">

            <div class="progress-bar"
                 id="progress-bar"></div>

        </div>

        <!-- Counter Boxes -->

        <div class="stats">

            <div class="box">

                <h2 id="total">0</h2>

                <span>Total Characters</span>

            </div>

            <div class="box">

                <h2 id="remaining">250</h2>

                <span>Remaining Characters</span>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
