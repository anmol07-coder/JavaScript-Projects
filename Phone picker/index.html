<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Phone Selector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 id="heading">
            Select A Mobile Phone
        </h1>

        <select id="phone-select">

            <option value="" selected disabled>
                -- Select Phone --
            </option>

            <option value="iPhone 16 Pro">
                iPhone 16 Pro
            </option>

            <option value="Samsung S25 Ultra">
                Samsung S25 Ultra
            </option>

            <option value="OnePlus 13">
                OnePlus 13
            </option>

            <option value="Google Pixel 9">
                Google Pixel 9
            </option>

            <option value="Nothing Phone 3">
                Nothing Phone 3
            </option>

        </select>

    </div>

    <script src="script.js"></script>

</body>
</html>
