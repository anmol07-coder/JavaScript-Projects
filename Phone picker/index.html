    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 id="heading">Select a Phone</h1>

        <select id="phone-select">
            <option value="" selected disabled>Choose a Phone</option>
            <option value="iPhone 16 Pro">iPhone 16 Pro</option>
            <option value="Samsung S25 Ultra">Samsung S25 Ultra</option>
            <option value="OnePlus 13">OnePlus 13</option>
            <option value="iPhone 15">iPhone 15</option>
            <option value="Samsung Galaxy Z Fold 6">Samsung Galaxy Z Fold 6</option>
            <option value="Nothing Phone 3">Nothing Phone 3</option>
            <option value="Xiaomi 15 Ultra">Xiaomi 15 Ultra</option>
            <option value="Vivo X200 Pro">Vivo X200 Pro</option>
            <option value="Realme GT 7 Pro">Realme GT 7 Pro</option>
        </select>
