<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyPress Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>⌨️ KeyPress Visualizer</h1>

        <div class="key-box">
            Press Any Key
        </div>

        <div class="info">

            <div class="card">
                <h3>Key</h3>
                <p id="key">-</p>
            </div>

            <div class="card">
                <h3>Key Code</h3>
                <p id="code">-</p>
            </div>

            <div class="card">
                <h3>Event Code</h3>
                <p id="eventCode">-</p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
