<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>
            <i class="ri-github-fill"></i>
            GitHub Profile Finder
        </h1>

        <p class="subtitle">
            Search any GitHub username and view the profile instantly.
        </p>

        <div class="search-box">

            <input
                type="text"
                id="username"
                placeholder="Enter GitHub username">

            <button id="search-btn">
                <i class="ri-search-line"></i>
                Search
            </button>

        </div>

        <p id="status"></p>

        <div class="profile-card">

            <img
                id="avatar"
                src="https://via.placeholder.com/150"
                alt="Profile Image">

            <h2 id="name">Name</h2>

            <p id="login">@username</p>

            <p id="bio">
                User bio will appear here.
            </p>

            <div class="stats">

                <div>
                    <h3 id="followers">0</h3>
                    <span>Followers</span>
                </div>

                <div>
                    <h3 id="following">0</h3>
                    <span>Following</span>
                </div>

                <div>
                    <h3 id="repos">0</h3>
                    <span>Repositories</span>
                </div>

            </div>

            <div class="extra-info">

                <p>
                    <i class="ri-map-pin-line"></i>
                    <span id="location">Not Available</span>
                </p>

                <p>
                    <i class="ri-building-line"></i>
                    <span id="company">Not Available</span>
                </p>

            </div>

            <a
                id="profile-link"
                href="#"
                target="_blank">

                View GitHub Profile

            </a>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
